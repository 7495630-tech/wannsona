name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          cache: true
      - name: Get dependencies
        run: cd wannsona_app && flutter pub get
      - name: Build APK
        run: cd wannsona_app && flutter build apk --debug --no-tree-shake-icons
      - uses: actions/upload-artifact@v4
        with:
          name: wannsona-apk
          path: wannsona_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
