name: Build APK
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          cache: true
      - name: Flutter pub get
        run: cd wannsona_app && flutter pub get
      - name: Build APK
        run: cd wannsona_app && flutter build apk --debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wannsona-apk
          path: wannsona_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
