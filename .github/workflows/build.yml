name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
      - run: cd wannsona_app && flutter pub get
      - run: cd wannsona_app && flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: wannsona-apk
          path: wannsona_app/build/app/outputs/flutter-apk/app-debug.apk
